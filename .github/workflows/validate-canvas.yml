name: Validate canvas.json

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run Validation Script
        id: run-validation
        run: node scripts/validate_canvas.js
        continue-on-error: true # Allow comment step to run even if script fails
      - name: Post PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: validation_report.md
      - name: Fail if validation failed
        if: steps.run-validation.outcome == 'failure'
        run: exit 1
